<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Styleguide — Kisala Films VHS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vhs.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="crt" aria-hidden="true"></div>
  <main class="section section--paper">
    <span class="eyebrow">INTERNAL</span>
    <h2 class="display">VHS<br>TOKENS.</h2>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:40px 0">
      <div style="background:#090a08;color:#e8e4d7;padding:24px;font:700 11px monospace">INK<br>#090a08</div>
      <div style="background:#e8e4d7;color:#090a08;padding:24px;font:700 11px monospace">PAPER<br>#e8e4d7</div>
      <div style="background:#d8ff36;color:#090a08;padding:24px;font:700 11px monospace">LIME<br>#d8ff36</div>
      <div style="background:#ff3b27;color:#fff;padding:24px;font:700 11px monospace">RED<br>#ff3b27</div>
      <div style="background:#ff6a29;color:#090a08;padding:24px;font:700 11px monospace">ORANGE<br>#ff6a29</div>
    </div>
    <p class="body-copy">Display: Archivo Black · Body: IBM Plex Sans · Meta: IBM Plex Mono · Accent: Georgia italic.</p>
    <p style="margin-top:24px"><a class="cta-primary" href="/">BACK TO ARCHIVE</a></p>
  </main>

</html>
